services:

  vss-behavior-analytics-alerts:
    extends:
      file: ${VSS_APPS_DIR}/services/analytics/behavior-analytics/compose.yml
      service: vss-behavior-analytics-base
    profiles: ["bp_developer_alerts_2d_cv"]
    volumes:
      - $VSS_APPS_DIR/developer-profiles/dev-profile-alerts/vss-behavior-analytics/configs/vss-behavior-analytics-kafka-config.json:/resources/vss-behavior-analytics-config.json
      - $VSS_APPS_DIR/developer-profiles/dev-profile-alerts/smc-app/calibration/sample-data/calibration.json:/resources/calibration.json
    container_name: vss-behavior-analytics
    command: python3 apps/smart_city/main_smart_city_app.py --config /resources/vss-behavior-analytics-config.json --calibration /resources/calibration.json

  nvstreamer-alerts:
    image: nvcr.io/nvstaging/vss-core/vss-vios-nvstreamer:${NVSTREAMER_IMAGE_TAG}
    user: "0:0"
    profiles: ["bp_developer_alerts_2d_cv"]
    entrypoint: [ '/bin/bash', '-c', 'if [ "$$NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES" = "true" ]; then /home/vst/vst_release/tools/user_additional_install.sh; fi && exec /home/vst/vst_release/launch_vst' ]
    environment:
      - NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES=${NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES}
      - ADAPTOR=streamer
      - HTTP_PORT=${NVSTREAMER_HTTP_PORT}
    network_mode: "host"
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 2
    container_name: vss-vios-nvstreamer
    volumes:
      - $VSS_APPS_DIR/developer-profiles/dev-profile-alerts/nvstreamer/configs/vst-config.json:/home/vst/vst_release/configs/vst_config.json
      - $VSS_APPS_DIR/developer-profiles/dev-profile-alerts/nvstreamer/configs/vst-storage.json:/home/vst/vst_release/configs/vst_storage.json
      - $VSS_DATA_DIR/videos/smc-app:/home/vst/vst_release/streamer_videos
      - $VSS_DATA_DIR/data_log/nvstreamer/vst_data:/home/vst/vst_release/vst_data
      - $VSS_APPS_DIR/services/vios/scripts/user_additional_install.sh:/home/vst/vst_release/tools/user_additional_install.sh
    depends_on:
      broker-health-check:
        condition: service_completed_successfully
  
  # No longer needed! we are moving to sdrc
  # perception-sdr-alerts:
  #   extends:
  #     file: $VSS_APPS_DIR/services/rtvi/rtvi-cv/compose.yaml
  #     service: perception-sdr
  #   profiles: ["bp_smartcities_2d_cv"]
  #   container_name: vss-rtvi-cv-sdr
  #   volumes:
  #     - $VSS_APPS_DIR/developer-profiles/dev-profile-alerts/sdr:/wdm-configs
  #     - $VSS_APPS_DIR/developer-profiles/dev-profile-alerts/sdr:/wdm-data
  #   environment:
  #     WDM_INITIALIZE_FROM_VST: true
  #     WDM_KFK_ENABLE: false
  #     WDM_PRELOAD_DELAY_FOR_DS_API: true
  #     WDM_WL_THRESHOLD: ${NUM_SENSORS}
  #     WDM_POD_WATCH_DOCKER_DELAY: 0.5
  #     WDM_WL_OBJECT_NAME: sdr-deepstream
  #     WDM_CONSUMER_GRP_ID: sdr-deepstream-cg
  #     WDM_CLUSTER_CONTAINER_NAMES: '["vss-rtvi-cv"]'

  perception-alerts:
    extends:
      file: $VSS_APPS_DIR/services/rtvi/rtvi-cv/compose.yaml
      service: perception
    profiles: ["bp_developer_alerts_2d_cv"]
    container_name: vss-rtvi-cv
    volumes:
      - $VSS_DATA_DIR/models/:/opt/storage/
      - $VSS_DATA_DIR/engines/:/opt/engines/
      - $VSS_APPS_DIR/developer-profiles/dev-profile-alerts/deepstream/configs/:/opt/nvidia/deepstream/deepstream/sources/apps/sample_apps/metropolis_perception_app/mounted-configs/

    environment:
      MODEL_TYPE: ${MODEL_TYPE}
      STREAM_TYPE: ${STREAM_TYPE}
      MODEL_NAME_2D: ${MODEL_NAME_2D}
      NUM_SENSORS: ${NUM_SENSORS}
      DS_MODEL_FAMILY: rtdetr-gdino
      DS_TRACKER_REID: "false"
      DS_SHOW_SENSOR_ID: "true"
      DS_CONFIG_FILE: /opt/nvidia/deepstream/deepstream/sources/apps/sample_apps/metropolis_perception_app/configs/run_config-api-rtdetr-protobuf.txt
    depends_on:
      kafka-topic-init-container:
        condition: service_completed_successfully
      rtvi-vlm:
        condition: service_healthy
        required: false

  kibana-init-container-alerts:
    build:
      context: $VSS_APPS_DIR/developer-profiles/dev-profile-alerts
      dockerfile: $VSS_APPS_DIR/developer-profiles/dev-profile-alerts/Dockerfiles/kibana-dashboard.Dockerfile
    network_mode: "host"
    profiles: ["bp_developer_alerts_2d_cv"]
    container_name: vss-kibana-init
    command: bash /opt/mdx/init-scripts/kibana-import-dashboard.sh
    depends_on:
      kibana:
        condition: service_healthy

  vss-video-analytics-api-alerts:
    extends:
      file: $VSS_APPS_DIR/services/analytics/video-analytics-api/compose.yml
      service: vss-video-analytics-api
    profiles: ["bp_developer_alerts_2d_cv"]
    container_name: vss-video-analytics-api
    volumes:
      - $VSS_APPS_DIR/developer-profiles/dev-profile-alerts/smc-app/vss-video-analytics-api:/opt/mdx/vss-video-analytics-api
      - $VSS_DATA_DIR/data_log/vss_video_analytics_api:/web-api-app/files

  import-calibration-output-container-smartcities:
    build:
      context: $VSS_APPS_DIR/developer-profiles/dev-profile-alerts/smc-app
      dockerfile: $VSS_APPS_DIR/developer-profiles/dev-profile-alerts/smc-app/Dockerfiles/import-calibration.Dockerfile
    network_mode: "host"
    profiles: ["bp_developer_alerts_2d_cv"]
    container_name: mdx-import-calibration-output-smc
    command: bash /opt/mdx/init-scripts/calibration-import.sh
    depends_on:
      - vss-video-analytics-api-alerts

  calibration-toolkit-smartcities:
    image: nvcr.io/nvidia/vss-core/calibration:3.1.0
    profiles: ["bp_developer_alerts_2d_cv"]
    network_mode: "host"
    volumes:
      - mdx-calibration-toolkit-alerts:/calibration/server/data:rw
    container_name: mdx-calibration-toolkit
    command: "deploy.sh 8003"

  vss-video-analytics-ui-smartcities:
    image: nvcr.io/nvidia/vss-core/vss-video-analytics-ui:3.1.0
    profiles: ["bp_developer_alerts_2d_cv"]
    network_mode: "host"
    volumes:
      - $VSS_APPS_DIR/developer-profiles/dev-profile-alerts/smc-app/vss-video-analytics-ui/config/vss-video-analytics-ui-config.json:/config/${VIDEO_ANALYTICS_UI_APP_NAME}/default-ui-config.json
    environment:
      APP_NAME: ${VIDEO_ANALYTICS_UI_APP_NAME}
      REACT_APP_OBTAIN_DYNAMIC_SERVICE_URLS: ${REACT_APP_OBTAIN_DYNAMIC_SERVICE_URLS:-false}
      REACT_APP_MEDIA_STREAMING_URL_BASE: http://$EXTERNAL_IP:30888/vst/api/v1
      REACT_APP_GOOGLE_MAPS_API_KEY: $GOOGLE_MAPS_API_KEY
      REACT_APP_API_URL_BASE: http://$EXTERNAL_IP:${MDX_PORT}
      PORT: "3002"
    container_name: vss-video-analytics-ui-smc
    restart: always
    depends_on:
      - vss-video-analytics-api-alerts
      - sensor-ms

volumes:
  mdx-nvstreamer-data:
  mdx-nvstreamer-videos:
  mdx-calibration-toolkit-alerts:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: $VSS_DATA_DIR/data_log/calibration_toolkit
