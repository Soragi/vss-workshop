# =============================================================================
# dev-profile-search Override Values - Example
# =============================================================================
# Copy and edit this file to install:
#
#   helm install vss-search helm/dev-profiles/dev-profile-search \
#     -f helm/dev-profiles/dev-profile-search/override-values.yaml \
#     -n metropolis --create-namespace
#
# =============================================================================

global:
  externalHost: "<EXTERNAL_HOST>"   # <- Set your node IP
  ngcApiKey: "nvapi-xxxxx"        # <- Set your NGC API key

# ── Agent config: search profile wired to in-cluster services ───────────────
vss-agent:
  llmBaseUrl: "http://nvidia-nemotron-nano-9b-v2:8000"
  vlmBaseUrl: "http://nvidia-cosmos3-reasoner:8000"
  evalLlmJudgeBaseUrl: "http://nvidia-nemotron-nano-9b-v2:8000"
  rtviEmbedBaseUrl: "http://vss-search-vss-rtvi-embed:8000"
  cosmosEmbedEndpoint: "http://vss-search-vss-rtvi-embed:8000"
  elasticsearchUrl: "http://vss-search-elasticsearch:9200"
  phoenixEndpoint: "http://phoenix:6006"
  vstBaseUrl: "http://vss-search-vss-vios-ingress:8000"
  vstInternalUrl: "http://vss-search-vss-vios-ingress:8000"

# ── Kafka: override advertised host for external broker access (optional) ─────
# kafka:
#   advertisedHost: "192.168.1.100"

# ── rtvi (vss-rtvi-cv + vss-rtvi-embed): GPU / keys ────────────────────────────
rtvi:
  enabled: true
  vss-rtvi-cv:
    gpu:
      deviceId: "0"
  vss-rtvi-embed:
    gpuDeviceId: "1"
    ngcApiKey: "nvapi-xxxxx"

