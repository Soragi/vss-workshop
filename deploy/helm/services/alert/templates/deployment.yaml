{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vss-alert-bridge.fullname" . }}
  labels:
    app.kubernetes.io/name: vss-alert-bridge
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: vss-alert-bridge
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vss-alert-bridge
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/config: {{ tpl (.Files.Get "configs/config.yml") . | sha256sum }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.waitForDependencies.enabled }}
      {{- $g := .Values.global | default dict }}
      {{- $pfx := default false (coalesce .Values.useReleaseNamePrefix (index $g "useReleaseNamePrefix")) }}
      {{- $kafkaDef := ternary (printf "%s-kafka-kafka" .Release.Name) "kafka-kafka" $pfx }}
      {{- $redisDef := ternary (printf "%s-redis" .Release.Name) "redis" $pfx }}
      {{- $esDef := ternary (printf "%s-elasticsearch" .Release.Name) "elasticsearch" $pfx }}
      {{- $kafkaH := .Values.waitForDependencies.kafkaHost | default $kafkaDef }}
      {{- $redisH := .Values.waitForDependencies.redisHost | default $redisDef }}
      {{- $esH := .Values.waitForDependencies.elasticsearchHost | default $esDef }}
      initContainers:
        - name: wait-for-kafka-redis-elasticsearch
          image: {{ .Values.waitForDependencies.image.repository }}:{{ .Values.waitForDependencies.image.tag }}
          imagePullPolicy: {{ .Values.waitForDependencies.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kafka {{ $kafkaH }}:{{ .Values.waitForDependencies.kafkaPort }}, Redis {{ $redisH }}:{{ .Values.waitForDependencies.redisPort }}, Elasticsearch {{ $esH }}:{{ .Values.waitForDependencies.elasticsearchPort }}"
              for i in $(seq 1 {{ .Values.waitForDependencies.maxRetries }}); do
                if nc -z {{ $kafkaH }} {{ .Values.waitForDependencies.kafkaPort }} 2>/dev/null \
                   && nc -z {{ $redisH }} {{ .Values.waitForDependencies.redisPort }} 2>/dev/null \
                   && nc -z {{ $esH }} {{ .Values.waitForDependencies.elasticsearchPort }} 2>/dev/null; then
                  echo "Kafka, Redis, and Elasticsearch are accepting connections"
                  exit 0
                fi
                echo "Attempt $i: waiting..."
                sleep {{ .Values.waitForDependencies.retryInterval }}
              done
              echo "Timeout waiting for Kafka, Redis, or Elasticsearch"
              exit 1
      {{- end }}
      containers:
        - name: vss-alert-bridge
          image: {{ include "vss-alert-bridge.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /usr/local/bin/python
            - enhance_alert_with_vlm.py
            - --config
            - /app/runtime/config.yml
          env:
            {{- $g := .Values.global | default dict }}
            {{- $pfx := default false (coalesce .Values.useReleaseNamePrefix (index $g "useReleaseNamePrefix")) }}
            {{- /* Same merge as vss-agent: subchart vlmBaseUrl overrides global.vlmBaseUrl. tpl() supports optional {{…}} templates; "" and plain URLs are unchanged (tpl("") is ""; tpl("http://host:8000") is identical). Empty after tpl → VLM_BASE_URL uses $vlmDef below. */}}
            {{- $rawVlmSub := .Values.vlmBaseUrl | default "" | toString }}
            {{- $rawVlmGlob := index $g "vlmBaseUrl" | default "" | toString }}
            {{- $rawVlmMerged := $rawVlmSub }}
            {{- if eq (trim $rawVlmSub) "" }}
            {{- $rawVlmMerged = $rawVlmGlob }}
            {{- end }}
            {{- $vlmUrl := trim (tpl $rawVlmMerged .) }}
            {{- $globVlmUrl := trim (default "" (index $g "vlmBaseUrl")) }}
            {{- $vstIngHost := ternary (printf "%s-vss-vios-ingress:30888" .Release.Name) "vss-vios-ingress:30888" $pfx }}
            {{- $subVn := trim (default "" .Values.vlmName) }}
            {{- $globVn := trim (default "" (index $g "vlmName")) }}
            {{- $vlmNameStr := $subVn | default $globVn | default "nvidia/cosmos3-nano-reasoner" }}
            {{- $vlmDef := ternary (printf "http://%s-nvidia-cosmos3-reasoner:8000" .Release.Name) "http://nvidia-cosmos3-reasoner:8000" $pfx }}
            - name: EXTERNAL_IP
              value: {{ .Values.externalIp | default (index (.Values.global | default dict) "externalHost" | default "" | trim) | default "127.0.0.1" | quote }}
            - name: INTERNAL_IP
              value: {{ .Values.internalIp | default $vstIngHost | quote }}
            - name: VLM_BASE_URL
              value: {{ $vlmUrl | default $vlmDef | quote }}
            - name: VLM_MODE
              value: {{ ternary "remote" "local" (ne $globVlmUrl "") | quote }}
            - name: VLM_NAME
              value: {{ $vlmNameStr | quote }}
            - name: RTVI_VLM_MODEL_TO_USE
              value: {{ .Values.rtviVlmModelToUse | default $vlmNameStr | quote }}
            - name: ALWAYS_ON_RULES_CONFIG
              value: "/app/configs/realtime-config.yml"
          volumeMounts:
            - name: runtime-config
              mountPath: /app/runtime
              readOnly: true
            - name: alert-type-config
              mountPath: /app/alert_type_config.json
              subPath: alert_type_config.json
              readOnly: true
            - name: realtime-config
              mountPath: /app/configs/realtime-config.yml
              subPath: realtime-config.yml
              readOnly: true
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: runtime-config
          configMap:
            name: {{ include "vss-alert-bridge.fullname" . }}-config
            items:
              - key: config.yml
                path: config.yml
        - name: alert-type-config
          configMap:
            name: {{ include "vss-alert-bridge.fullname" . }}-config
            items:
              - key: alert_type_config.json
                path: alert_type_config.json
        - name: realtime-config
          configMap:
            name: {{ include "vss-alert-bridge.fullname" . }}-config
            items:
              - key: realtime-config.yml
                path: realtime-config.yml
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
