{{- if and .Values.enabled .Values.downloadModelsFromNgc }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vss-rtvi-cv.fullname" . }}-download-models
  labels:
    app.kubernetes.io/name: vss-rtvi-cv
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $ips := .Values.imagePullSecrets | default .Values.global.imagePullSecrets }}
      {{- with $ips }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: download-models
          image: {{ .Values.ngcDownload.image.repository }}:{{ .Values.ngcDownload.image.tag }}
          imagePullPolicy: {{ .Values.ngcDownload.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: NGC_CLI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ngcApiKeySecretName | default "ngc-api" }}
                  key: {{ .Values.ngcApiKeySecretKey | default "NGC_CLI_API_KEY" }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              export DEBIAN_FRONTEND=noninteractive
              echo "[INFO] Installing NGC CLI..."
              apt-get update -qq && apt-get install -y -qq wget unzip > /dev/null
              cd /tmp
              wget -q https://ngc.nvidia.com/downloads/ngccli_linux.zip -O ngccli_linux.zip
              unzip -q ngccli_linux.zip && chmod +x ngc-cli/ngc
              export PATH="/tmp/ngc-cli:$PATH"
              ngc --version
              echo "[INFO] Downloading models from NGC..."
              DEST="/data/models"
              {{- range .Values.ngcModelsToDownload }}
              mkdir -p "${DEST}/$(dirname {{ .destPath | quote }})"
              ngc registry model download-version {{ .model | quote }} --org {{ $.Values.ngcOrg | default "nvidia" | quote }}
              mv {{ .sourcePath | quote }} "${DEST}/{{ .destPath }}"
              rm -rf $(dirname {{ .sourcePath | quote }})
              {{- end }}
              {{- $vals := .Values | toYaml | fromYaml }}
              {{- $veModel := dig "models" "visionEncoder" "model" "siglip_v2" $vals }}
              {{- $veVersion := dig "models" "visionEncoder" "version" "v1.1" $vals }}
              # Workaround: DeepStream expects "siglip2_*" but NGC ships "siglip_v2_*".
              WEIGHTS_FILE="{{ $veModel }}_{{ $veVersion }}_weights.bin"
              COMPAT_LINK="{{ $veModel | replace "_v2" "2" }}_{{ $veVersion }}_weights.bin"
              if [[ -f "${DEST}/${WEIGHTS_FILE}" && ! -e "${DEST}/${COMPAT_LINK}" ]]; then
                ln -s "${WEIGHTS_FILE}" "${DEST}/${COMPAT_LINK}"
                echo "[INFO] Created compatibility symlink: ${COMPAT_LINK} -> ${WEIGHTS_FILE}"
              fi
              chmod -R a+rX "${DEST}"
              echo "[INFO] Models downloaded to ${DEST}"
          volumeMounts:
            - name: models
              mountPath: /data/models
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: {{ include "vss-rtvi-cv.fullname" . }}-models
{{- end }}
