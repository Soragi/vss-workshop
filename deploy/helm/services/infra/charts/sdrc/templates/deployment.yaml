{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sdrc.fullname" . }}
  labels:
    {{- include "sdrc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "sdrc.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sdrc.selectorLabels" . | nindent 8 }}
      {{- if .Values.config.rolloutVersion }}
      annotations:
        sdrc.nvidia.com/config-rollout-version: {{ .Values.config.rolloutVersion | quote }}
      {{- end }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "sdrc.serviceAccountName" . }}
      {{- end }}
      {{- $imagePullSecrets := .Values.imagePullSecrets | default .Values.global.imagePullSecrets }}
      {{- with $imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: sdrc
          image: {{ include "sdrc.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: controller
              containerPort: {{ required "service.controller.port is required" .Values.service.controller.port | int }}
              protocol: TCP
            - name: sdrc-direct
              containerPort: {{ required "service.sdrcDirectListener.port is required" .Values.service.sdrcDirectListener.port | int }}
              protocol: TCP
            - name: admin
              containerPort: {{ required "service.envoyAdmin.port is required" .Values.service.envoyAdmin.port | int }}
              protocol: TCP
          env:
            {{- include "sdrc.runtimeEnv" . | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: {{ include "sdrc.configMountPath" . | quote }}
              subPath: {{ include "sdrc.configKey" . | quote }}
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "sdrc.configMapName" . }}
{{- end }}
