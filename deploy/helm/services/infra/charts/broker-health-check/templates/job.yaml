{{- if .Values.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vss-broker-health-check.fullname" . }}
  labels:
    app.kubernetes.io/name: vss-broker-health-check
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 60
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vss-broker-health-check
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $g := .Values.global | default dict }}
      {{- $pfx := default false (coalesce .Values.useReleaseNamePrefix (index $g "useReleaseNamePrefix")) }}
      {{- $kafkaH := ternary (printf "%s-kafka-kafka" .Release.Name) "kafka-kafka" $pfx }}
      {{- $redisH := ternary (printf "%s-redis" .Release.Name) "redis" $pfx }}
      containers:
        - name: vss-broker-health-check
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kafka at {{ .Values.kafkaHost | default $kafkaH }}:{{ .Values.kafkaPort }} and Redis at {{ .Values.redisHost | default $redisH }}:{{ .Values.redisPort }}"
              for i in $(seq 1 {{ .Values.maxRetries }}); do
                if nc -z {{ .Values.kafkaHost | default $kafkaH }} {{ .Values.kafkaPort }} 2>/dev/null && nc -z {{ .Values.redisHost | default $redisH }} {{ .Values.redisPort }} 2>/dev/null; then
                  echo "Kafka and Redis are ready"
                  exit 0
                fi
                echo "Attempt $i: waiting..."
                sleep {{ .Values.retryInterval }}
              done
              echo "Timeout waiting for brokers"
              exit 1
{{- end }}
