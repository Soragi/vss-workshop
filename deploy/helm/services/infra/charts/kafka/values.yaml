replicas: 1
image:
  repository: confluentinc/cp-kafka
  tag: "8.2.0"
  pullPolicy: IfNotPresent
nodeId: "1"
brokerId: "1"
advertisedHost: ""
advertisedPort: "9092"
heapOpts: "-Xmx6G -Xms6G"
maxRequestSize: "10485760"
# KRaft single-node: higher timeout avoids spurious quorum timeouts under GC/load (optional).
controllerQuorumRequestTimeoutMs: "10000"
# YAML list of topic specs (name + optional partitions, replication_factor, retention_ms, segment_ms).
# For backward compatibility, `topics` may instead be a single JSON string (legacy charts).
topics:
  - name: mdx-raw
  - name: mdx-bev
  - name: mdx-space-utilization
  - name: mdx-alerts
  - name: mdx-behavior
  - name: mdx-behavior-plus
  - name: mdx-frames
  - name: mdx-mtmc
  - name: mdx-rtls
  - name: mdx-rtls-region-1
  - name: mdx-amr
  - name: mdx-vlm-alerts
  - name: mdx-notification
    partitions: "1"
  - name: mdx-events
  - name: mdx-incidents
  - name: mdx-vlm-incidents
  - name: mdx-vlm
  - name: mdx-vlm-captions
  - name: mdx-structured-events-summary
  - name: mdx-embed
  - name: mdx-embed-filtered
defaultPartitions: "8"
defaultReplicationFactor: "1"
defaultRetentionMs: "14400000"
defaultSegmentMs: "3600000"
service:
  type: ClusterIP
  port: 9092
persistence:
  storageClass: ""
  size: 50Gi
  # Subdirectory of the PVC mounted at /tmp/kafka-data so Kafka does not see ext4 "lost+found"
  # at the volume root. Set to "" to mount the PVC root (existing clusters with data at root).
  dataSubPath: kraft-logs
resources:
  requests:
    memory: "6Gi"
    cpu: "1"
  limits:
    memory: "8Gi"
    cpu: "2"
nodeSelector: {}
tolerations: []

# cp-kafka runs as UID 1000; fsGroup makes RWO block volumes group-writable (e.g. OKE).
podSecurityContext:
  fsGroup: 1000

topicJob:
  enabled: true
  ttlSecondsAfterFinished: 300
  backoffLimit: 10
  # Empty: inherits kafka.nodeSelector from the Job template coalesce.
  nodeSelector: {}

# Prometheus kafka-exporter sidecar deployment
exporter:
  enabled: false
  image: danielqsj/kafka-exporter:latest
  port: 9308
  nodeSelector: {}
  resources: {}
