{{- if .Values.topicJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kafka.fullname" . }}-topics-init
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka-topics-init
spec:
  ttlSecondsAfterFinished: {{ .Values.topicJob.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.topicJob.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "kafka.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: kafka-topics-init
    spec:
      restartPolicy: OnFailure
      {{- with (coalesce .Values.topicJob.nodeSelector .Values.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: kafka-topics-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: TOPICS_JSON
              value: {{ include "kafka.topicsJSON" . | quote }}
          command:
            - bash
            - -c
            - |
              BOOTSTRAP="{{ include "kafka.fullname" . }}-kafka:{{ .Values.service.port }}"
              echo "Waiting for Kafka at $BOOTSTRAP..."
              until kafka-topics --bootstrap-server "$BOOTSTRAP" --list > /dev/null 2>&1; do
                echo "Kafka not ready, retrying in 10s..."
                sleep 10
              done
              echo "Kafka is ready. Creating topics..."
              python3 -c "
              import json, os, subprocess, sys
              topics = json.loads(os.environ.get('TOPICS_JSON') or '[]')
              bootstrap = '${BOOTSTRAP}'
              for t in topics:
                  name = t['name']
                  partitions = t.get('partitions', '{{ .Values.defaultPartitions }}')
                  replication = t.get('replication_factor', '{{ .Values.defaultReplicationFactor }}')
                  retention = t.get('retention_ms', '{{ .Values.defaultRetentionMs }}')
                  segment = t.get('segment_ms', '{{ .Values.defaultSegmentMs }}')
                  cmd = [
                      'kafka-topics', '--bootstrap-server', bootstrap,
                      '--create', '--if-not-exists',
                      '--topic', name,
                      '--partitions', str(partitions),
                      '--replication-factor', str(replication),
                      '--config', f'retention.ms={retention}',
                      '--config', f'segment.ms={segment}',
                  ]
                  result = subprocess.run(cmd, capture_output=True, text=True)
                  if result.returncode == 0:
                      print(f'Created topic: {name}')
                  else:
                      print(f'Error creating topic {name}: {result.stderr}', file=sys.stderr)
              print('All topics processed.')
              "
{{- end }}
