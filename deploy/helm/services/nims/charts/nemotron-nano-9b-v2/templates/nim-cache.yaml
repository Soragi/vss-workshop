# NIMCache CRD – downloads and caches the Nemotron Nano 9B v2 model weights.
# The NIM Operator monitors this resource and provisions the PVC automatically.
apiVersion: apps.nvidia.com/v1alpha1
kind: NIMCache
metadata:
  name: {{ include "nemotron.fullname" . }}
  labels:
    {{- include "nemotron.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
spec:
  {{- with .Values.nodeSelector }}
  nodeSelector:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.tolerations }}
  tolerations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  source:
    ngc:
      modelPuller: {{ .Values.image.repository }}:{{ .Values.image.tag }}
      pullSecret: {{ .Values.global.pullSecretName | quote }}
      authSecret: {{ .Values.global.authSecretName | quote }}
      model:
        profiles:
          - all
  storage:
    pvc:
      storageClass: {{ include "nemotron.storageClass" . | quote }}
      create: true
      size: {{ .Values.storage.pvc.size | quote }}
      volumeAccessMode: ReadWriteOnce
  resources: {}
