# NIMService CRD – runs the Nemotron Nano 9B v2 inference server.
# Reads model weights from the NIMCache PVC provisioned above.
apiVersion: apps.nvidia.com/v1alpha1
kind: NIMService
metadata:
  name: {{ include "nemotron.fullname" . }}
  labels:
    {{- include "nemotron.labels" . | nindent 4 }}
spec:
  {{- with .Values.nodeSelector }}
  nodeSelector:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.tolerations }}
  tolerations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  authSecret: {{ .Values.global.authSecretName | quote }}
  labels:
    {{- include "nemotron.selectorLabels" . | nindent 4 }}
  {{- if .Values.metrics.enabled }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ .Values.service.port | quote }}
    prometheus.io/path: "/v1/metrics"
  {{- end }}
  # GPU-tuning env vars read from the nim-env ConfigMap (all optional).
  env:
    - name: PYTORCH_CUDA_ALLOC_CONF
      valueFrom:
        configMapKeyRef:
          name: {{ include "nemotron.fullname" . }}-nim-env
          key: PYTORCH_CUDA_ALLOC_CONF
          optional: true
    - name: NIM_KVCACHE_PERCENT
      valueFrom:
        configMapKeyRef:
          name: {{ include "nemotron.fullname" . }}-nim-env
          key: NIM_KVCACHE_PERCENT
          optional: true
    - name: NIM_GPU_MEM_FRACTION
      valueFrom:
        configMapKeyRef:
          name: {{ include "nemotron.fullname" . }}-nim-env
          key: NIM_GPU_MEM_FRACTION
          optional: true
    - name: NIM_MAX_NUM_SEQS
      valueFrom:
        configMapKeyRef:
          name: {{ include "nemotron.fullname" . }}-nim-env
          key: NIM_MAX_NUM_SEQS
          optional: true
    - name: NIM_MAX_MODEL_LEN
      valueFrom:
        configMapKeyRef:
          name: {{ include "nemotron.fullname" . }}-nim-env
          key: NIM_MAX_MODEL_LEN
          optional: true
    - name: NIM_LOW_MEMORY_MODE
      valueFrom:
        configMapKeyRef:
          name: {{ include "nemotron.fullname" . }}-nim-env
          key: NIM_LOW_MEMORY_MODE
          optional: true
  {{- if .Values.metrics.enabled }}
  metrics:
    enabled: true
  {{- end }}
  expose:
    service:
      port: {{ .Values.service.port }}
      type: {{ .Values.service.type }}
  image:
    pullPolicy: {{ .Values.image.pullPolicy }}
    pullSecrets:
      - {{ .Values.global.pullSecretName | quote }}
    repository: {{ .Values.image.repository }}
    tag: {{ .Values.image.tag | quote }}
  replicas: {{ .Values.replicas }}
  resources:
    {{- toYaml .Values.resources | nindent 4 }}
  storage:
    nimCache:
      name: {{ include "nemotron.fullname" . }}
