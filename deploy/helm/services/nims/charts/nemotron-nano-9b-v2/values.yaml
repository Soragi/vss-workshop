# Default values for nemotron-nano-9b-v2.
# These are overridden by the parent nims chart via alias "nemotron".

image:
  repository: nvcr.io/nim/nvidia/nvidia-nemotron-nano-9b-v2
  tag: latest
  pullPolicy: IfNotPresent

replicas: 1

resources:
  limits:
    nvidia.com/gpu: "1"
  requests:
    nvidia.com/gpu: "1"

storage:
  pvc:
    storageClass: ""
    size: "50Gi"

metrics:
  enabled: false

service:
  type: ClusterIP
  port: 8000

nodeSelector: {}

tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"

# GPU-specific env vars. Populated via GPU override values files.
env:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  NIM_KVCACHE_PERCENT: ""
  NIM_GPU_MEM_FRACTION: ""
  NIM_MAX_NUM_SEQS: ""
  NIM_MAX_MODEL_LEN: ""
  NIM_LOW_MEMORY_MODE: ""

global:
  pullSecretName: "ngc-nim-docker-reg-secret"
  authSecretName: "ngc-nim-api-key-secret"
  storageClass: ""
