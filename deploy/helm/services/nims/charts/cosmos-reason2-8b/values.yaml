# Default values for cosmos-reason2-8b.
# These are overridden by the parent nims chart via alias "cosmos".

image:
  repository: nvcr.io/nim/nvidia/cosmos-reason2-8b
  tag: "1.6.0"
  pullPolicy: IfNotPresent

replicas: 1

resources:
  limits:
    nvidia.com/gpu: "1"
  requests:
    nvidia.com/gpu: "1"

storage:
  pvc:
    storageClass: ""
    size: "200Gi"
  sharedMemorySizeLimit: "32Gi"

metrics:
  enabled: false

service:
  type: ClusterIP
  port: 8000

nodeSelector: {}

tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"

# GPU-specific env vars. Populated via GPU override values files.
# H100:         NIM_KVCACHE_PERCENT=0.7
# L40S:         NIM_KVCACHE_PERCENT=0.8, NIM_MAX_MODEL_LEN=32768, NIM_MAX_NUM_SEQS=4, MAX_JOBS=4
# RTXPRO6000BW: NIM_KVCACHE_PERCENT=0.7
env:
  NIM_KVCACHE_PERCENT: "0.7"
  NIM_PASSTHROUGH_ARGS: "--gpu-memory-utilization 0.7"
  NIM_MAX_MODEL_LEN: ""
  NIM_MAX_NUM_SEQS: ""
  MAX_JOBS: ""
# Keys to import from <cosmos-fullname>-nim-env ConfigMap into NIMService.spec.env.
# Missing keys are skipped due to optional: true.
envConfigMapKeys:
  - NIM_KVCACHE_PERCENT
  - NIM_PASSTHROUGH_ARGS
  - NIM_DISABLE_MM_PREPROCESSOR_CACHE

global:
  pullSecretName: "ngc-nim-docker-reg-secret"
  authSecretName: "ngc-nim-api-key-secret"
  storageClass: ""
