{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vss-summarization.fullname" . }}
  labels:
    app.kubernetes.io/name: vss-summarization
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: vss-summarization
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vss-summarization
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $release := .Release.Name }}
      {{- $g := .Values.global | default dict }}
      {{- $pfx := default false (coalesce .Values.useReleaseNamePrefix (index $g "useReleaseNamePrefix")) }}
      {{- $esHost := .Values.elasticsearchHost | default (ternary (printf "%s-elasticsearch" $release) "elasticsearch" $pfx) }}
      {{- $esPort := .Values.elasticsearchPort | default "9200" }}
      {{- $esTransportPort := .Values.elasticsearchTransportPort | default "9300" }}
      {{- $kafkaHost := ternary (printf "%s-kafka-kafka" $release) "kafka-kafka" $pfx }}
      {{- $kafkaBootstrap := .Values.kafkaBootstrapServers | default (printf "%s:9092" $kafkaHost) }}
      {{- $llmSvc := .Values.llmService | default "nvidia-nemotron-nano-9b-v2" }}
      {{- $vlmSvc := .Values.vlmService | default "nvidia-cosmos3-reasoner" }}
      {{- /* Same base URL as vss-agent (global / subchart); LVS OpenAI paths need /v1 — append when missing */}}
      {{- $llmIn := trim (default "" (coalesce .Values.llmBaseUrl (index $g "llmBaseUrl"))) }}
      {{- $vlmIn := trim (default "" (coalesce .Values.vlmBaseUrl (index $g "vlmBaseUrl"))) }}
      {{- $llmHost := ternary (printf "%s-%s" $release $llmSvc) $llmSvc $pfx }}
      {{- $vlmHost := ternary (printf "%s-%s" $release $vlmSvc) $vlmSvc $pfx }}
      {{- $llmBaseUrl := ternary (printf "http://%s:8000/v1" $llmHost) (ternary (printf "%s/v1" (trimSuffix "/" $llmIn)) $llmIn (not (hasSuffix "/v1" $llmIn))) (eq $llmIn "") }}
      {{- $vlmBaseUrl := ternary (printf "http://%s:8000/v1" $vlmHost) (ternary (printf "%s/v1" (trimSuffix "/" $vlmIn)) $vlmIn (not (hasSuffix "/v1" $vlmIn))) (eq $vlmIn "") }}
      {{- $llmModelName := trim (default "" (coalesce .Values.llmName (index $g "llmName") "nvidia/nvidia-nemotron-nano-9b-v2")) }}
      {{- $vlmModelName := trim (default "" (coalesce .Values.vlmName (index $g "vlmName") "nvidia/cosmos3-nano-reasoner")) }}
      {{- $vstIng := ternary (printf "%s-vss-vios-ingress" $release) "vss-vios-ingress" $pfx }}
      {{- $vstInternalUrl := .Values.vstInternalUrl | default (printf "http://%s:30888" $vstIng) }}
      {{- $wfe := .Values.waitForVlmEndpoint | default dict }}
      {{- if ($wfe.enabled | default true) }}
      initContainers:
        - name: wait-vlm-endpoint
          image: {{ .Values.waitForVlmEndpoint.image.repository }}:{{ .Values.waitForVlmEndpoint.image.tag }}
          imagePullPolicy: {{ .Values.waitForVlmEndpoint.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: VIA_VLM_ENDPOINT
              value: {{ $vlmBaseUrl | quote }}
            - name: MAX_ATTEMPTS
              value: {{ .Values.waitForVlmEndpoint.maxAttempts | default 120 | quote }}
            - name: SLEEP_SECONDS
              value: {{ .Values.waitForVlmEndpoint.sleepSeconds | default 5 | quote }}
          command:
            - sh
            - -c
            - |
              set -eu
              URL="${VIA_VLM_ENDPOINT}"
              i=0
              echo "Waiting until VLM endpoint responds: ${URL}"
              until curl -sS --connect-timeout 5 --max-time 15 -o /dev/null "$URL"; do
                i=$((i+1))
                if [ "$i" -ge "${MAX_ATTEMPTS}" ]; then
                  echo "Timeout after ${MAX_ATTEMPTS} attempts waiting for ${URL}"
                  exit 1
                fi
                echo "  attempt ${i}/${MAX_ATTEMPTS} ..."
                sleep "${SLEEP_SECONDS}"
              done
              echo "VLM endpoint reachable."
      {{- end }}
      containers:
        - name: vss-summarization
          image: {{ include "vss-summarization.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: backend
              containerPort: {{ .Values.service.backendPort }}
            - name: mcp
              containerPort: {{ .Values.service.mcpPort }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            {{- if .Values.modelCache.enabled }}
            - name: model-cache
              mountPath: /tmp/model_cache
            {{- end }}
          env:
            {{- /*
              Merge env from three sources, deduplicating by name.
              Precedence (later sources override earlier ones):
                1. .Values.env                  — service-chart defaults
                2. hardcoded computed values    — wired-in template values
                3. .Values.extraEnv             — profile-chart overrides
              Without this dedup, a profile that overlays a base key (e.g.
              LVS_ENABLE_LLM_MERGING) produces a Deployment with two entries
              for the same name, which kubectl server-side apply rejects.
            */}}
            {{- $envMap := dict }}
            {{- range .Values.env }}
            {{- $_ := set $envMap .name (.value | default "" | toString) }}
            {{- end }}
            {{- $_ := set $envMap "KAFKA_BOOTSTRAP_SERVERS"              ($kafkaBootstrap  | toString) }}
            {{- $_ := set $envMap "ES_HOST"                              ($esHost          | toString) }}
            {{- $_ := set $envMap "ES_PORT"                              ($esPort          | toString) }}
            {{- $_ := set $envMap "ES_TRANSPORT_PORT"                    ($esTransportPort | toString) }}
            {{- $_ := set $envMap "LVS_LLM_BASE_URL"                     ($llmBaseUrl      | toString) }}
            {{- $_ := set $envMap "LVS_LLM_MODEL_NAME"                   ($llmModelName    | toString) }}
            {{- $_ := set $envMap "VIA_VLM_ENDPOINT"                     ($vlmBaseUrl      | toString) }}
            {{- $_ := set $envMap "VIA_VLM_OPENAI_MODEL_DEPLOYMENT_NAME" ($vlmModelName    | toString) }}
            {{- $_ := set $envMap "VST_INTERNAL_URL"                     ($vstInternalUrl  | toString) }}
            {{- range (.Values.extraEnv | default list) }}
            {{- $_ := set $envMap .name (tpl (.value | default "" | toString) $) }}
            {{- end }}
            {{- /*
              Emit alphabetically. Go's text/template already sorts map keys
              implicitly when ranging, but pinning the order explicitly with
              sortAlpha documents the intent and prevents accidental
              re-ordering if the template is refactored to a helper later.
            */}}
            {{- range $k := (keys $envMap | sortAlpha) }}
            - name: {{ $k }}
              value: {{ index $envMap $k | quote }}
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "vss-summarization.fullname" . }}-config
        {{- if .Values.modelCache.enabled }}
        - name: model-cache
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
