enabled: true

image:
  repository: nvcr.io/nvidia/vss-core/calibration
  tag: "3.2.1"
  pullPolicy: IfNotPresent

replicas: 1

service:
  type: ClusterIP
  port: 8003

resources: {}

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""
  accessMode: ReadWriteOnce

nodeSelector: {}
tolerations: []

global:
  imagePullSecrets: []
