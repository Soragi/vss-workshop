server {
    listen 3100;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Attendees update the repository while the workshop is running. Avoid a
    # stale browser bundle after a container refresh.
    add_header Cache-Control "no-store" always;

    location = /health {
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
