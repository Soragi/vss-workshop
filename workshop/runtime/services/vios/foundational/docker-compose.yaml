services:
  centralizedb:
    image: ${POSTGRES_IMAGE}
    container_name: vss-vios-postgres
    network_mode: host
    profiles: ["bp_developer_base_2d"]
    user: "0:0"
    environment:
      POSTGRES_USER: ${CENTRALIZE_DB_USERNAME}
      POSTGRES_DB: ${CENTRALIZE_DB_NAME}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - vios_pg_data:/var/lib/postgresql/data
      - ${VST_CONFIG_PATH}/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ${VST_DATA_PATH}:/var/run/postgresql
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf", "-c", "unix_socket_directories=/var/run/postgresql"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h /var/run/postgresql -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\" >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 60
    restart: unless-stopped

  vst-ingress:
    image: ${NGINX_IMAGE}
    container_name: vss-vios-ingress
    network_mode: host
    profiles: ["bp_developer_base_2d"]
    user: "0:0"
    environment:
      VST_INGRESS_HTTP_PORT: ${VST_INGRESS_HTTP_PORT}
    volumes:
      - ${VST_CONFIG_PATH}/nginx-${VST_NGINX_MODE}.conf:/etc/nginx/nginx.conf:ro
      - ${VST_LOGS}/nginx_logs:/var/log/nginx
    command: ["nginx", "-c", "/etc/nginx/nginx.conf", "-g", "daemon off;"]
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/$${VST_INGRESS_HTTP_PORT:-30888}'"]
      interval: 5s
      timeout: 3s
      retries: 30
    depends_on:
      sensor-ms:
        condition: service_healthy
    restart: unless-stopped

volumes:
  vios_pg_data:
