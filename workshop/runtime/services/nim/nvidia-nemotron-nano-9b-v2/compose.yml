services:
  nvidia-nemotron-nano-9b-v2:
    image: nvcr.io/nim/nvidia/nvidia-nemotron-nano-9b-v2:1
    container_name: nvidia-nemotron-nano-9b-v2
    profiles: ["llm_local_nvidia-nemotron-nano-9b-v2"]
    runtime: nvidia
    shm_size: 16GB
    ports:
      - "${LLM_PORT:-30081}:8000"
    environment:
      NGC_API_KEY: "${NGC_CLI_API_KEY}"
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    env_file:
      - ${VSS_APPS_DIR}/services/nim/nvidia-nemotron-nano-9b-v2/hw-${HARDWARE_PROFILE}.env
      - ${LLM_ENV_FILE:-${VSS_APPS_DIR}/services/nim/fallback-override.env}
    volumes:
      - nvidia_nemotron_nano_9b_v2_cache:/opt/nim/.cache
    user: "${UID:-1000}:${GID:-1000}"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia
              device_ids: ["${LLM_DEVICE_ID:-0}"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ -f /tmp/ready_done ]; then curl --max-time 30 -f http://localhost:8000/v1/health/live; else elapsed=0; while ! curl -fs http://localhost:8000/v1/health/ready >/dev/null 2>&1; do sleep 5; elapsed=$$((elapsed + 5)); if [ $$elapsed -ge 600 ]; then exit 1; fi; done; touch /tmp/ready_done && curl --max-time 30 -f http://localhost:8000/v1/health/live; fi"]
      interval: 60s
      timeout: 650s
      retries: 2

volumes:
  nvidia_nemotron_nano_9b_v2_cache:
