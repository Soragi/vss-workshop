version: '3.8'

services:
  # Kafka container (KRaft mode - no Zookeeper required)
  alert-bridge-kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: alert-bridge-kafka-test
    network_mode: host
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9092"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis container for deduplication
  alert-bridge-redis:
    image: redis/redis-stack-server:7.2.0-v9
    container_name: alert-bridge-redis-test
    network_mode: host
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Alert Bridge container - config file passed via BLUEPRINT_CONFIG env var
  alert-bridge:
    image: nvcr.io/nvidia/vss-core/vss-alert-verification:3.2.0
    container_name: alert-bridge-test
    network_mode: host
    depends_on:
      alert-bridge-kafka:
        condition: service_healthy
      alert-bridge-redis:
        condition: service_healthy
    volumes:
      # Mount the blueprint-specific config (set via BLUEPRINT_CONFIG env var)
      - ./${BLUEPRINT_CONFIG:-config_warehouse_sim.yaml}:/app/configs/config.yaml:ro
      # Mount the blueprint_config directory for alert type configs
      - ../../../blueprint_config:/app/blueprint_config:ro
    working_dir: /app
    command: ["/usr/local/bin/python", "enhance_alert_with_vlm.py", "--config", "/app/configs/config.yaml"]
    restart: "no"
    environment:
      - PYTHONUNBUFFERED=1
